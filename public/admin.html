<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kenya045 Admin — Command Centre</title>
<style>
:root{
  --black:#080808;--deep:#0f0f0f;--surface:#161616;--card:#1c1c1c;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --gold:#c9922a;--gold2:#e8b455;--white:#f5f0e8;--muted:rgba(245,240,232,0.5);
  --faint:rgba(245,240,232,0.2);--green:#27ae60;--red:#c0392b;--blue:#2980b9;
  --font:'Outfit',sans-serif;--r:8px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--black);color:var(--white);font-family:var(--font);font-size:14px;line-height:1.6;cursor:default;}
a{color:var(--gold);text-decoration:none;}
button,input,select,textarea{cursor:pointer;}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:3rem;width:100%;max-width:400px;text-align:center;}
.login-logo{font-size:1.5rem;font-weight:700;color:var(--white);margin-bottom:4px;letter-spacing:2px;}
.login-logo span{color:var(--gold);}
.login-sub{color:var(--muted);font-size:12px;letter-spacing:1px;margin-bottom:2rem;}
.login-input{width:100%;background:var(--black);border:1px solid var(--border2);color:var(--white);padding:12px 14px;border-radius:6px;font-size:14px;outline:none;margin-bottom:12px;font-family:var(--font);}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:var(--gold);color:var(--black);border:none;padding:13px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:background 0.2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.login-btn:hover{background:var(--gold2);}
.login-btn:active{background:var(--gold2);transform:scale(0.98);}
.login-btn:disabled{opacity:0.7;cursor:not-allowed;}
.login-error{color:#e74c3c;font-size:13px;margin-top:10px;min-height:20px;}

/* ── LAYOUT ── */
#app{display:none;height:100vh;overflow:hidden;}
.layout{display:flex;height:100%;}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--deep);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid var(--border);}
.sidebar-brand-name{font-size:14px;font-weight:700;letter-spacing:1px;color:var(--white);}
.sidebar-brand-name span{color:var(--gold);}
.sidebar-tag{font-size:10px;color:var(--muted);letter-spacing:1px;}
.sidebar-nav{flex:1;padding:12px 0;}
.nav-section{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);padding:14px 20px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;color:var(--muted);border-left:2px solid transparent;transition:all 0.15s;font-size:13px;}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,0.04);}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(201,146,42,0.06);}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--gold);color:var(--black);font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
.logout-btn{width:100%;background:none;border:1px solid var(--border2);color:var(--muted);padding:8px;border-radius:6px;cursor:pointer;font-family:var(--font);font-size:12px;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{background:var(--deep);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:16px;font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-email{font-size:12px;color:var(--muted);}
.email-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;}
.email-dot.off{background:#555;}
.content{padding:28px;flex:1;}

/* ── CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.stat-card-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
.stat-card-num{font-size:2rem;font-weight:700;color:var(--gold);line-height:1;}
.stat-card-sub{font-size:11px;color:var(--faint);margin-top:4px;}

/* ── TABLE ── */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:24px;}
.section-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.section-head-title{font-size:14px;font-weight:600;}
.search-input{background:var(--black);border:1px solid var(--border2);color:var(--white);padding:7px 12px;border-radius:6px;font-size:13px;outline:none;font-family:var(--font);width:200px;}
.search-input:focus{border-color:var(--gold);}
.filter-select{background:var(--black);border:1px solid var(--border2);color:var(--white);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;font-family:var(--font);cursor:pointer;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);font-weight:600;}
td{padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.td-name{font-weight:600;color:var(--white);}
.td-id{font-size:11px;color:var(--muted);font-family:monospace;}
.td-date{font-size:12px;color:var(--muted);}

/* Badges */
.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:0.3px;}
.badge-pending{background:rgba(201,146,42,0.15);color:var(--gold);}
.badge-confirmed{background:rgba(39,174,96,0.15);color:#2ecc71;}
.badge-delivered{background:rgba(41,128,185,0.15);color:#3498db;}
.badge-cancelled{background:rgba(192,57,43,0.15);color:#e74c3c;}
.badge-new{background:rgba(155,89,182,0.15);color:#9b59b6;}
.badge-replied{background:rgba(39,174,96,0.15);color:#2ecc71;}
.badge-closed{background:rgba(255,255,255,0.08);color:var(--muted);}

/* Action buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all 0.15s;white-space:nowrap;}
.btn-gold{background:var(--gold);color:var(--black);}
.btn-gold:hover{background:var(--gold2);}
.btn-outline{background:none;border:1px solid var(--border2);color:var(--muted);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-red{background:rgba(192,57,43,0.15);color:#e74c3c;border:1px solid rgba(192,57,43,0.2);}
.btn-red:hover{background:rgba(192,57,43,0.25);}
.btn-green{background:rgba(39,174,96,0.15);color:#2ecc71;border:1px solid rgba(39,174,96,0.2);}
.btn-green:hover{background:rgba(39,174,96,0.25);}
.btn-blue{background:rgba(41,128,185,0.15);color:#3498db;border:1px solid rgba(41,128,185,0.2);}
.btn-blue:hover{background:rgba(41,128,185,0.25);}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
.page-btns{display:flex;gap:6px;}
.page-btn{background:none;border:1px solid var(--border2);color:var(--muted);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;font-family:var(--font);}
.page-btn:hover,.page-btn.active{border-color:var(--gold);color:var(--gold);}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:15px;font-weight:600;}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0 4px;}
.modal-close:hover{color:var(--white);}
.modal-body{padding:24px;}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.detail-row{display:flex;gap:12px;margin-bottom:12px;font-size:13px;}
.detail-label{color:var(--muted);width:120px;flex-shrink:0;font-size:12px;}
.detail-value{color:var(--white);}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--black);border:1px solid var(--border2);color:var(--white);padding:10px 12px;border-radius:6px;font-size:13px;outline:none;font-family:var(--font);}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);}
.form-textarea{resize:vertical;min-height:120px;line-height:1.6;}
.form-select option{background:var(--surface);}

/* Recent activity */
.activity-list{display:flex;flex-direction:column;gap:0;}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.activity-dot-booking{background:var(--gold);}
.activity-dot-inquiry{background:#9b59b6;}
.activity-info{flex:1;}
.activity-name{font-size:13px;font-weight:600;}
.activity-desc{font-size:12px;color:var(--muted);}
.activity-time{font-size:11px;color:var(--faint);flex-shrink:0;}

/* Email logs */
.log-type{font-size:10px;background:rgba(201,146,42,0.1);color:var(--gold);padding:2px 8px;border-radius:4px;}
.log-sim{font-size:10px;background:rgba(255,255,255,0.06);color:var(--muted);padding:2px 8px;border-radius:4px;margin-left:6px;}

/* Broadcast */
.broadcast-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px;}
.broadcast-card h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--gold);}

/* Toast */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--card);border:1px solid var(--border2);color:var(--white);padding:12px 20px;border-radius:8px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,0.5);border-left:3px solid var(--gold);animation:toastIn 0.3s ease;max-width:360px;pointer-events:auto;}
.toast.error{border-left-color:#e74c3c;}
.toast.success{border-left-color:#2ecc71;}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}}

/* Loading */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(201,146,42,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{display:none;position:absolute;inset:0;background:rgba(8,8,8,0.7);align-items:center;justify-content:center;border-radius:var(--r);z-index:10;}
.loading-overlay.show{display:flex;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state-icon{font-size:3rem;margin-bottom:12px;}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">KENYA<span>045</span></div>
    <div class="login-sub">ADMIN COMMAND CENTRE</div>
    <input class="login-input" type="text" id="loginUser" placeholder="Username" autocomplete="username"/>
    <input class="login-input" type="password" id="loginPass" placeholder="Password" autocomplete="current-password"/>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-name">KENYA<span>045</span></div>
        <div class="sidebar-tag">ADMIN PANEL v2.0</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <div class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard">
          <span class="nav-icon">📊</span>Dashboard
        </div>
        <div class="nav-section">Clients</div>
        <div class="nav-item" onclick="showPage('bookings')" data-page="bookings">
          <span class="nav-icon">📅</span>Bookings
          <span class="nav-badge" id="badge-bookings">0</span>
        </div>
        <div class="nav-item" onclick="showPage('inquiries')" data-page="inquiries">
          <span class="nav-icon">✉️</span>Inquiries
          <span class="nav-badge" id="badge-inquiries">0</span>
        </div>
        <div class="nav-section">Email</div>
        <div class="nav-item" onclick="showPage('broadcast')" data-page="broadcast">
          <span class="nav-icon">📢</span>Broadcast
        </div>
        <div class="nav-item" onclick="showPage('email-logs')" data-page="email-logs">
          <span class="nav-icon">📋</span>Email Logs
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="doLogout()">↩ Sign Out</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-right">
          <span class="topbar-email"><span class="email-dot" id="emailDot"></span><span id="emailStatus">Checking email…</span></span>
        </div>
      </div>
      <div class="content" id="content">
        <!-- Pages rendered here -->
      </div>
    </main>
  </div>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">Detail</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<!-- ── TOAST CONTAINER ── -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ─── STATE ─────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('k045_token') || '';
let currentPage = 'dashboard';
let bookingsPage = 1, inquiriesPage = 1, logsPage = 1;
let bookingsSearch = '', bookingsStatus = '', inquiriesSearch = '', inquiriesStatus = '';

// ─── AUTH ──────────────────────────────────────────────────────────────────
var _loggingIn = false; // prevent double-fire

async function doLogin() {
  if (_loggingIn) return;
  var user  = (document.getElementById('loginUser').value || '').trim();
  var pass  = document.getElementById('loginPass').value || '';
  var errEl = document.getElementById('loginError');
  var btn   = document.getElementById('loginBtn');

  // Clear previous error
  errEl.style.color   = '#e74c3c';
  errEl.textContent   = '';

  if (!user || !pass) {
    errEl.textContent = 'Please enter username and password.';
    return;
  }

  _loggingIn      = true;
  btn.disabled    = true;
  btn.textContent = 'Signing in...';
  errEl.style.color   = '#c9922a';
  errEl.textContent   = 'Connecting...';

  try {
    var r = await fetch('/api/auth/login', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ username: user, password: pass }),
    });
    var d = await r.json();
    if (d.token) {
      TOKEN = d.token;
      localStorage.setItem('k045_token', TOKEN);
      errEl.textContent = '';
      startApp();
    } else {
      errEl.style.color = '#e74c3c';
      errEl.textContent = d.error || 'Wrong username or password.';
      btn.disabled      = false;
      btn.textContent   = 'Sign In';
      _loggingIn        = false;
    }
  } catch (err) {
    errEl.style.color = '#e74c3c';
    errEl.textContent = 'Cannot reach server. Is it deployed?';
    btn.disabled      = false;
    btn.textContent   = 'Sign In';
    _loggingIn        = false;
  }
}

async function verifyToken() {
  if (!TOKEN) return false;
  try {
    const r = await fetch('/api/auth/verify', { headers:{ 'x-session-token': TOKEN } });
    return r.ok;
  } catch { return false; }
}

async function doLogout() {
  await fetch('/api/auth/logout', { method:'POST', headers:{ 'x-session-token': TOKEN } }).catch(()=>{});
  TOKEN = '';
  localStorage.removeItem('k045_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  if (TOKEN && await verifyToken()) { startApp(); }
  else { TOKEN=''; localStorage.removeItem('k045_token'); }
}

function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  checkHealth();
  showPage('dashboard');
}

// ─── API ───────────────────────────────────────────────────────────────────
async function api(method, url, body) {
  const opts = { method, headers:{ 'Content-Type':'application/json','x-session-token': TOKEN } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (r.status === 401) { doLogout(); throw new Error('Session expired'); }
  return r.json();
}

// ─── HEALTH ───────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const d = await fetch('/api/health').then(r=>r.json());
    const dot = document.getElementById('emailDot');
    const txt = document.getElementById('emailStatus');
    if (d.email === 'configured') { dot.classList.remove('off'); txt.textContent = 'Email active'; }
    else { dot.classList.add('off'); txt.textContent = 'Email simulated'; }
  } catch {}
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────
const pageTitles = { dashboard:'Dashboard', bookings:'Bookings', inquiries:'Inquiries', broadcast:'Email Broadcast', 'email-logs':'Email Logs' };
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('topbarTitle').textContent = pageTitles[page] || page;
  const pages = { dashboard: renderDashboard, bookings: renderBookings, inquiries: renderInquiries, broadcast: renderBroadcast, 'email-logs': renderEmailLogs };
  if (pages[page]) pages[page]();
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────
async function renderDashboard() {
  const c = document.getElementById('content');
  c.innerHTML = '<div class="stats-grid" id="statsGrid"><div class="stat-card"><div class="stat-card-label">Loading…</div><div class="stat-card-num">—</div></div></div><div class="section-card"><div class="section-head"><div class="section-head-title">Recent Activity</div></div><div id="activityList"></div></div>';
  try {
    const d = await api('GET', '/api/stats');
    document.getElementById('badge-bookings').textContent = d.bookings.pending || 0;
    document.getElementById('badge-inquiries').textContent = d.inquiries.new || 0;
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-card-label">Total Bookings</div><div class="stat-card-num">${d.bookings.total}</div><div class="stat-card-sub">${d.bookings.pending||0} pending</div></div>
      <div class="stat-card"><div class="stat-card-label">Confirmed</div><div class="stat-card-num">${d.bookings.confirmed||0}</div><div class="stat-card-sub">Bookings confirmed</div></div>
      <div class="stat-card"><div class="stat-card-label">Inquiries</div><div class="stat-card-num">${d.inquiries.total}</div><div class="stat-card-sub">${d.inquiries.new||0} new</div></div>
      <div class="stat-card"><div class="stat-card-label">Emails Sent</div><div class="stat-card-num">${d.emails.sent}</div><div class="stat-card-sub">Total logged</div></div>`;
    const al = document.getElementById('activityList');
    if (!d.recent.length) { al.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>No activity yet</div>'; return; }
    al.innerHTML = d.recent.map(r => `
      <div class="activity-item">
        <div class="activity-dot activity-dot-${r._type}"></div>
        <div class="activity-info">
          <div class="activity-name">${r.fullName||r.name}</div>
          <div class="activity-desc">${r._type === 'booking' ? `${r.eventType} · ${r.county}` : `Inquiry: ${r.subject}`}</div>
        </div>
        <div class="activity-time">${timeAgo(r.submittedAt)}</div>
      </div>`).join('');
  } catch(e) { c.innerHTML = `<div class="empty-state"><div>Error loading stats: ${e.message}</div></div>`; }
}

// ─── BOOKINGS ─────────────────────────────────────────────────────────────
async function renderBookings() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="section-card">
      <div class="section-head">
        <div class="section-head-title">All Bookings</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">

            <option value="confirmed" ${bookingsStatus==='confirmed'?'selected':''}>Confirmed</option>

async function loadBookings() {
  const params = new URLSearchParams({ page: bookingsPage, limit:20, search: bookingsSearch, status: bookingsStatus });
  const d = await api('GET', `/api/bookings?${params}`);
  const el = document.getElementById('bookingsTable');
  if (!d.bookings.length) { el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>No bookings found</div>'; return; }
  el.innerHTML = `<table><thead><tr><th>ID</th><th>Client</th><th>Event</th><th>Date</th><th>County</th><th>Status</th><th>Actions</th></tr></thead><tbody>
    ${d.bookings.map(b=>`<tr>
      <td><span class="td-id">${b.id}</span></td>
      <td><div class="td-name">${b.fullName}</div><div class="td-date">${b.email}</div></td>
      <td>${b.eventType}</td>
      <td class="td-date">${b.eventDate}</td>
      <td>${b.county}</td>
      <td><span class="badge badge-${b.status}">${b.status}</span></td>
      <td><div style="display:flex;gap:6px;">
        <button class="btn btn-outline" onclick="viewBooking('${b.id}')">View</button>
        <button class="btn btn-green" onclick="confirmBooking('${b.id}')">✓ Confirm</button>
        <button class="btn btn-blue" onclick="messageBooking('${b.id}')">✉</button>
      </div></td>
    </tr>`).join('')}
  </tbody></table>`;
  const pag = document.getElementById('bookingsPagination');
  const totalPages = Math.ceil(d.total / d.limit);
  pag.innerHTML = `<span>${d.total} bookings</span><div class="page-btns">${Array.from({length:totalPages},(_,i)=>`<button class="page-btn ${i+1===bookingsPage?'active':''}" onclick="bookingsPage=${i+1};loadBookings()">${i+1}</button>`).join('')}</div>`;
}

async function viewBooking(id) {
  const b = await api('GET', `/api/bookings/${id}`);
  openModal('Booking Details', `
    ${[['Booking ID',b.id],['Full Name',b.fullName],['Email',b.email],['Phone',b.phone],['Event Type',b.eventType],['Event Date',b.eventDate],['County',b.county],['Venue',b.venue],['Submitted',new Date(b.submittedAt).toLocaleString()]]
      .map(([l,v])=>`<div class="detail-row"><div class="detail-label">${l}</div><div class="detail-value">${v}</div></div>`).join('')}
    ${b.additional?`<div class="detail-row"><div class="detail-label">Additional</div><div class="detail-value" style="color:var(--muted)">${b.additional}</div></div>`:''}

      <div class="form-label">Status</div>
      <select class="form-select" id="bStatusEdit"><option value="pending" ${b.status==='pending'?'selected':''}>Pending</option><option value="confirmed" ${b.status==='confirmed'?'selected':''}>Confirmed</option><option value="delivered" ${b.status==='delivered'?'selected':''}>Delivered</option><option value="cancelled" ${b.status==='cancelled'?'selected':''}>Cancelled</option></select>
    </div>

      <div class="form-label">Notes</div>

async function saveBooking(id) {
  const status = document.getElementById('bStatusEdit').value;
  const notes  = document.getElementById('bNotesEdit').value;
  await api('PATCH', `/api/bookings/${id}`, { status, notes });
  toast('Booking updated'); closeModal(); loadBookings();
}

async function deleteBooking(id) {
  if (!confirm('Delete this booking permanently?')) return;
  await api('DELETE', `/api/bookings/${id}`);
  toast('Booking deleted'); closeModal(); loadBookings();
}

async function confirmBooking(id) {
  const b = await api('GET', `/api/bookings/${id}`);
  openModal('Confirm Availability', `

async function sendConfirm(id) {
  const message = document.getElementById('confirmMsg').value;
  await api('POST', `/api/bookings/${id}/confirm`, { message });

async function messageBooking(id) {
  const b = await api('GET', `/api/bookings/${id}`);

// ─── MODAL ────────────────────────────────────────────────────────────────
function openModal(title, body, foot='') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFoot').innerHTML = foot;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOnBg(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

// ─── TOAST ────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.4s'; },3500);
  setTimeout(()=>t.remove(),4000);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000), h = Math.floor(m/60), d = Math.floor(h/24);
  if (d > 0) return `${d}d ago`;
  if (h > 0) return `${h}h ago`;
  if (m > 0) return `${m}m ago`;
  return 'just now';
}

};
