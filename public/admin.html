<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kenya045 Admin</title>
<style>
:root{
  --black:#080808;--deep:#0f0f0f;--surface:#161616;--card:#1c1c1c;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --gold:#c9922a;--gold2:#e8b455;--white:#f5f0e8;
  --muted:rgba(245,240,232,0.5);--faint:rgba(245,240,232,0.2);
  --green:#27ae60;--red:#c0392b;--font:'Outfit',sans-serif;--r:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--black);color:var(--white);font-family:var(--font),Arial,sans-serif;font-size:14px;line-height:1.6;cursor:default;}
a{color:var(--gold);text-decoration:none;}
button,input,select,textarea{font-family:inherit;cursor:pointer;}
input,textarea{cursor:text;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--surface);border:1px solid rgba(201,146,42,0.3);border-radius:16px;padding:40px;width:100%;max-width:380px;text-align:center;}
.login-logo{font-size:22px;font-weight:700;color:var(--white);margin-bottom:4px;letter-spacing:3px;}
.login-logo span{color:var(--gold);}
.login-sub{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
.login-input{
  display:block;width:100%;background:#111;border:1px solid var(--border2);
  color:var(--white);padding:13px 16px;border-radius:8px;font-size:15px;
  outline:none;margin-bottom:12px;
}
.login-input:focus{border-color:var(--gold);}
.login-btn{
  display:block;width:100%;background:var(--gold);color:#000;border:none;
  padding:14px;border-radius:8px;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:1px;text-transform:uppercase;
  margin-top:4px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  user-select:none;
  -webkit-user-select:none;
}
.login-btn:active{background:var(--gold2);transform:scale(0.98);}
.login-btn:disabled{opacity:0.6;}
.login-msg{margin-top:14px;font-size:13px;min-height:20px;padding:8px;border-radius:6px;}
.login-msg.error{color:#ff6b6b;background:rgba(192,57,43,0.15);}
.login-msg.info{color:var(--gold);background:rgba(201,146,42,0.1);}
.login-msg.success{color:#2ecc71;background:rgba(39,174,96,0.1);}

/* APP */
#app{display:none;height:100vh;overflow:hidden;}
.layout{display:flex;height:100%;}

/* SIDEBAR */
.sidebar{width:220px;flex-shrink:0;background:var(--deep);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-brand{padding:20px;border-bottom:1px solid var(--border);}
.sidebar-brand-name{font-size:15px;font-weight:700;letter-spacing:2px;}
.sidebar-brand-name span{color:var(--gold);}
.sidebar-tag{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
.sidebar-nav{flex:1;padding:12px 0;}
.nav-section{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);padding:14px 20px 6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--muted);border-left:2px solid transparent;transition:all 0.15s;font-size:13px;}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,0.04);}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(201,146,42,0.06);}
.nav-badge{margin-left:auto;background:var(--gold);color:#000;font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
.logout-btn{width:100%;background:none;border:1px solid var(--border2);color:var(--muted);padding:9px;border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{background:var(--deep);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:16px;font-weight:600;}
.email-indicator{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.email-dot{width:8px;height:8px;border-radius:50%;background:#555;}
.email-dot.on{background:var(--green);}
.content{padding:24px;flex:1;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
.stat-num{font-size:2rem;font-weight:700;color:var(--gold);line-height:1;}
.stat-sub{font-size:11px;color:var(--faint);margin-top:4px;}

/* SECTION CARD */
.sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.sec-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.sec-title{font-size:14px;font-weight:600;}
.s-input{background:#0d0d0d;border:1px solid var(--border2);color:var(--white);padding:7px 12px;border-radius:6px;font-size:13px;outline:none;width:200px;}
.s-input:focus{border-color:var(--gold);}
.s-sel{background:#0d0d0d;border:1px solid var(--border2);color:var(--white);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;cursor:pointer;}

/* TABLE */
table{width:100%;border-collapse:collapse;}
th{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-weight:600;}
td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.015);}
.t-id{font-size:11px;color:var(--muted);font-family:monospace;}
.t-name{font-weight:600;}
.t-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* BADGES */
.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;}
.b-pending{background:rgba(201,146,42,0.15);color:var(--gold);}
.b-confirmed{background:rgba(39,174,96,0.15);color:#2ecc71;}
.b-delivered{background:rgba(41,128,185,0.15);color:#3498db;}
.b-cancelled{background:rgba(192,57,43,0.15);color:#e74c3c;}
.b-new{background:rgba(155,89,182,0.15);color:#9b59b6;}
.b-replied{background:rgba(39,174,96,0.15);color:#2ecc71;}
.b-closed{background:rgba(255,255,255,0.06);color:var(--muted);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;white-space:nowrap;}
.btn-gold{background:var(--gold);color:#000;}
.btn-gold:hover{background:var(--gold2);}
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--muted);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-danger{background:rgba(192,57,43,0.12);color:#e74c3c;border:1px solid rgba(192,57,43,0.2);}
.btn-danger:hover{background:rgba(192,57,43,0.22);}
.btn-ok{background:rgba(39,174,96,0.12);color:#2ecc71;border:1px solid rgba(39,174,96,0.2);}
.btn-ok:hover{background:rgba(39,174,96,0.22);}
.btn-blue{background:rgba(52,152,219,0.12);color:#3498db;border:1px solid rgba(52,152,219,0.2);}

/* PAGINATION */
.pager{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
.pager-btns{display:flex;gap:5px;}
.pg-btn{background:none;border:1px solid var(--border2);color:var(--muted);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;}
.pg-btn:hover,.pg-btn.on{border-color:var(--gold);color:var(--gold);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:15px;font-weight:600;}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:0;}
.modal-close:hover{color:var(--white);}
.modal-body{padding:22px;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.det-row{display:flex;gap:10px;margin-bottom:10px;font-size:13px;}
.det-label{color:var(--muted);width:110px;flex-shrink:0;font-size:12px;}
.fl{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fl label{font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);}
.fl input,.fl select,.fl textarea{background:#0d0d0d;border:1px solid var(--border2);color:var(--white);padding:10px 12px;border-radius:6px;font-size:13px;outline:none;}
.fl input:focus,.fl select:focus,.fl textarea:focus{border-color:var(--gold);}
.fl textarea{resize:vertical;min-height:110px;line-height:1.6;}
.fl select option{background:var(--surface);}

/* ACTIVITY */
.act-item{display:flex;align-items:flex-start;gap:10px;padding:11px 18px;border-bottom:1px solid var(--border);}
.act-item:last-child{border-bottom:none;}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.act-dot.bk{background:var(--gold);}
.act-dot.iq{background:#9b59b6;}
.act-info{flex:1;}
.act-name{font-size:13px;font-weight:600;}
.act-desc{font-size:12px;color:var(--muted);}
.act-time{font-size:11px;color:var(--faint);flex-shrink:0;}

/* BROADCAST */
.bc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px;}
.bc-title{font-size:14px;font-weight:600;color:var(--gold);margin-bottom:16px;}

/* LOG */
.log-type{font-size:10px;background:rgba(201,146,42,0.1);color:var(--gold);padding:2px 8px;border-radius:4px;}
.log-sim{font-size:10px;background:rgba(255,255,255,0.05);color:var(--muted);padding:2px 8px;border-radius:4px;margin-left:5px;}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:10px;}

/* SPINNER */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(201,146,42,0.2);border-top-color:var(--gold);border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{padding:40px;text-align:center;}

/* TOAST */
.toast-c{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--card);border:1px solid var(--border2);color:var(--white);padding:12px 20px;border-radius:8px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:tIn 0.3s ease;max-width:340px;border-left:3px solid var(--gold);}
.toast.ok{border-left-color:#2ecc71;}
.toast.err{border-left-color:#e74c3c;}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">KENYA<span>045</span></div>
    <div class="login-sub">Admin Command Centre</div>
    <input type="text" class="login-input" id="uInput" placeholder="Username" autocomplete="username" spellcheck="false"/>
    <input type="password" class="login-input" id="pInput" placeholder="Password" autocomplete="current-password"/>
    <button class="login-btn" id="signInBtn">Sign In</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-name">KENYA<span>045</span></div>
        <div class="sidebar-tag">Admin Panel v2.0</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Overview</div>
        <div class="nav-item active" data-page="dashboard" onclick="goPage('dashboard')"><span>📊</span> Dashboard</div>
        <div class="nav-section">Clients</div>
        <div class="nav-item" data-page="bookings" onclick="goPage('bookings')"><span>📅</span> Bookings <span class="nav-badge" id="bBadge">0</span></div>
        <div class="nav-item" data-page="inquiries" onclick="goPage('inquiries')"><span>✉️</span> Inquiries <span class="nav-badge" id="iBadge">0</span></div>
        <div class="nav-section">Email</div>
        <div class="nav-item" data-page="broadcast" onclick="goPage('broadcast')"><span>📢</span> Broadcast</div>
        <div class="nav-item" data-page="logs" onclick="goPage('logs')"><span>📋</span> Email Logs</div>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="doLogout()">↩ Sign Out</button>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="topbar-title" id="pageTitle">Dashboard</div>
        <div class="email-indicator"><div class="email-dot" id="eDot"></div><span id="eStatus">—</span></div>
      </div>
      <div class="content" id="pageContent"></div>
    </main>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="mTitle"></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot" id="mFoot"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-c" id="toastC"></div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
var TOKEN = '';
var bPage=1, iPage=1, lPage=1;
var bSearch='', bStatus='', iSearch='', iStatus='';

// ═══════════════════════════════════════════════════════
// LOGIN — wired directly, no async/await, plain XHR
// ═══════════════════════════════════════════════════════
function setMsg(text, type) {
  var el = document.getElementById('loginMsg');
  el.textContent = text;
  el.className = 'login-msg' + (type ? ' ' + type : '');
}

function doLogin() {
  var u = document.getElementById('uInput').value.trim();
  var p = document.getElementById('pInput').value;
  var btn = document.getElementById('signInBtn');

  if (!u || !p) { setMsg('Enter username and password.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  setMsg('Connecting to server...', 'info');

  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/auth/login', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 10000;

  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      if (d.token) {
        TOKEN = d.token;
        try { localStorage.setItem('k045_token', TOKEN); } catch(e) {}
        setMsg('', '');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        checkHealth();
        goPage('dashboard');
      } else {
        setMsg(d.error || 'Wrong username or password.', 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch(e) {
      setMsg('Server returned unexpected response (HTTP ' + xhr.status + ')', 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  };

  xhr.onerror = function() {
    setMsg('Network error — cannot reach server.', 'error');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  };

  xhr.ontimeout = function() {
    setMsg('Request timed out. Server may be starting up.', 'error');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  };

  xhr.send(JSON.stringify({ username: u, password: p }));
}

function doLogout() {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/auth/logout', true);
  xhr.setRequestHeader('x-session-token', TOKEN);
  xhr.send();
  TOKEN = '';
  try { localStorage.removeItem('k045_token'); } catch(e) {}
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('signInBtn').disabled = false;
  document.getElementById('signInBtn').textContent = 'Sign In';
  setMsg('', '');
}

// ═══════════════════════════════════════════════════════
// INIT — check saved token on page load
// ═══════════════════════════════════════════════════════
(function init() {
  var saved = '';
  try { saved = localStorage.getItem('k045_token') || ''; } catch(e) {}
  if (!saved) return;

  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/auth/verify', true);
  xhr.setRequestHeader('x-session-token', saved);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      if (d.valid) {
        TOKEN = saved;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        checkHealth();
        goPage('dashboard');
      } else {
        try { localStorage.removeItem('k045_token'); } catch(e) {}
      }
    } catch(e) {}
  };
  xhr.onerror = function() {};
  xhr.send();
})();

// Wire sign-in button and Enter key
document.getElementById('signInBtn').addEventListener('click', doLogin);
document.getElementById('pInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('uInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('pInput').focus();
});

// ═══════════════════════════════════════════════════════
// API HELPER
// ═══════════════════════════════════════════════════════
function api(method, url, body, cb) {
  var xhr = new XMLHttpRequest();
  xhr.open(method, url, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('x-session-token', TOKEN);
  xhr.onload = function() {
    if (xhr.status === 401) { doLogout(); return; }
    try { cb(null, JSON.parse(xhr.responseText)); }
    catch(e) { cb(e); }
  };
  xhr.onerror = function() { cb(new Error('Network error')); };
  xhr.send(body ? JSON.stringify(body) : null);
}

// ═══════════════════════════════════════════════════════
// HEALTH CHECK
// ═══════════════════════════════════════════════════════
function checkHealth() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/health', true);
  xhr.onload = function() {
    try {
      var d = JSON.parse(xhr.responseText);
      var dot = document.getElementById('eDot');
      var status = document.getElementById('eStatus');
      if (d.email === 'configured') { dot.className='email-dot on'; status.textContent='Email active'; }
      else { dot.className='email-dot'; status.textContent='Email simulated'; }
    } catch(e) {}
  };
  xhr.send();
}

// ═══════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════
var pageTitles = { dashboard:'Dashboard', bookings:'Bookings', inquiries:'Inquiries', broadcast:'Email Broadcast', logs:'Email Logs' };

function goPage(page) {
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.getElementById('pageTitle').textContent = pageTitles[page] || page;
  var pages = { dashboard:renderDashboard, bookings:renderBookings, inquiries:renderInquiries, broadcast:renderBroadcast, logs:renderLogs };
  if (pages[page]) pages[page]();
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function renderDashboard() {
  document.getElementById('pageContent').innerHTML = '<div class="loading"><span class="spin"></span></div>';
  api('GET', '/api/stats', null, function(err, d) {
    if (err) { document.getElementById('pageContent').innerHTML = '<div class="empty">Error loading stats</div>'; return; }
    document.getElementById('bBadge').textContent = d.bookings.pending || 0;
    document.getElementById('iBadge').textContent = d.inquiries.new || 0;
    var html = '<div class="stats-grid">'
      + statCard('Total Bookings', d.bookings.total, (d.bookings.pending||0)+' pending')
      + statCard('Confirmed', d.bookings.confirmed||0, 'bookings confirmed')
      + statCard('Inquiries', d.inquiries.total, (d.inquiries.new||0)+' new')
      + statCard('Emails Sent', d.emails.sent, 'total logged')
      + '</div>'
      + '<div class="sec"><div class="sec-head"><div class="sec-title">Recent Activity</div></div><div id="actList"></div></div>';
    document.getElementById('pageContent').innerHTML = html;
    var al = document.getElementById('actList');
    if (!d.recent || !d.recent.length) { al.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>No activity yet</div>'; return; }
    al.innerHTML = d.recent.map(function(r) {
      return '<div class="act-item"><div class="act-dot '+(r._type==='booking'?'bk':'iq')+'"></div>'
        +'<div class="act-info"><div class="act-name">'+(r.fullName||r.name)+'</div>'

function renderBookings() {
  document.getElementById('pageContent').innerHTML =
    '<div class="sec">'
    +'<div class="sec-head"><div class="sec-title">All Bookings</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;">'
    +'<input class="s-input" id="bSrch" placeholder="Search..." value="'+bSearch+'" oninput="bSearch=this.value;bPage=1;loadBookings()"/>'
    +'<select class="s-sel" id="bStat" onchange="bStatus=this.value;bPage=1;loadBookings()">'
    +'<option value="">All Status</option>'
    +'<option value="pending"'+(bStatus==='pending'?' selected':'')+'>Pending</option>'
    +'<option value="confirmed"'+(bStatus==='confirmed'?' selected':'')+'>Confirmed</option>'
    +'<option value="delivered"'+(bStatus==='delivered'?' selected':'')+'>Delivered</option>'
    +'<option value="cancelled"'+(bStatus==='cancelled'?' selected':'')+'>Cancelled</option>'

function loadBookings() {
  var url = '/api/bookings?page='+bPage+'&limit=20&search='+encodeURIComponent(bSearch)+'&status='+bStatus;
  api('GET', url, null, function(err, d) {
    if (err || !d) return;
    var el = document.getElementById('bTable');
    if (!d.bookings || !d.bookings.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📭</div>No bookings found</div>'; return; }
    var rows = d.bookings.map(function(b) {
      return '<tr>'
        +'<td><div class="t-id">'+b.id+'</div></td>'
        +'<td><div class="t-name">'+b.fullName+'</div><div class="t-sub">'+b.email+'</div></td>'
        +'<td>'+b.eventType+'</td>'
        +'<td>'+b.eventDate+'</td>'
        +'<td>'+b.county+'</td>'
        +'<td><span class="badge b-'+b.status+'">'+b.status+'</span></td>'
        +'<td><div style="display:flex;gap:5px;">'
        +'<button class="btn btn-ghost" onclick="viewBooking(\''+b.id+'\')">View</button>'
        +'<button class="btn btn-ok" onclick="confirmBooking(\''+b.id+'\')">✓</button>'
        +'<button class="btn btn-blue" onclick="msgBooking(\''+b.id+'\')">✉</button>'
        +'</div></td></tr>';
    }).join('');
    el.innerHTML = '<table><thead><tr><th>ID</th><th>Client</th><th>Event</th><th>Date</th><th>County</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table>';
    var tp = Math.ceil(d.total/20);
    var pbtns = Array.from({length:tp},function(_,i){return '<button class="pg-btn'+(i+1===bPage?' on':'')+'" onclick="bPage='+(i+1)+';loadBookings()">'+(i+1)+'</button>';}).join('');
    document.getElementById('bPager').innerHTML = '<span>'+d.total+' bookings</span><div class="pager-btns">'+pbtns+'</div>';
  });
}

function viewBooking(id) {
  api('GET', '/api/bookings/'+id, null, function(err, b) {
    if (err) return;
    var rows = [['ID',b.id],['Name',b.fullName],['Email',b.email],['Phone',b.phone],['Event',b.eventType],['Date',b.eventDate],['County',b.county],['Venue',b.venue],['Submitted',new Date(b.submittedAt).toLocaleString()]];
    var html = rows.map(function(r){return '<div class="det-row"><div class="det-label">'+r[0]+'</div><div>'+r[1]+'</div></div>';}).join('');
    if (b.additional) html += '<div class="det-row"><div class="det-label">Notes</div><div style="color:var(--muted)">'+b.additional+'</div></div>';
    html += '<div class="fl" style="margin-top:14px"><label>Status</label><select id="bsEdit"><option value="pending"'+(b.status==='pending'?' selected':'')+'>Pending</option><option value="confirmed"'+(b.status==='confirmed'?' selected':'')+'>Confirmed</option><option value="delivered"'+(b.status==='delivered'?' selected':'')+'>Delivered</option><option value="cancelled"'+(b.status==='cancelled'?' selected':'')+'>Cancelled</option></select></div>';
    html += '<div class="fl"><label>Internal Notes</label><textarea id="bnEdit" style="min-height:70px">'+(b.notes||'')+'</textarea></div>';
    openModal('Booking: '+b.id, html,
      '<button class="btn btn-danger" onclick="delBooking(\''+id+'\')">Delete</button>'

      +'<button class="btn btn-gold" onclick="saveBooking(\''+id+'\')">Save</button>');
  });
}

function saveBooking(id) {
  var status = document.getElementById('bsEdit').value;
  var notes  = document.getElementById('bnEdit').value;
  api('PATCH', '/api/bookings/'+id, {status:status,notes:notes}, function(err) {
    if (err) return;
    toast('Saved ✓');
    closeModal();
    loadBookings();
  });
}

function delBooking(id) {
  if (!confirm('Delete this booking?')) return;
  api('DELETE', '/api/bookings/'+id, null, function(err) {
    if (err) return;
    toast('Deleted');
    closeModal();
    loadBookings();
  });
}

function confirmBooking(id) {
  api('GET', '/api/bookings/'+id, null, function(err, b) {
    if (err) return;
    openModal('Confirm — '+b.fullName,
      '<p style="color:var(--muted);margin-bottom:14px">Send confirmation email to <strong>'+b.email+'</strong></p>'
      +'<div class="fl"><label>Optional Message</label><textarea id="confMsg" placeholder="e.g. Please send 30% deposit to confirm..."></textarea></div>',
      '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'
      +'<button class="btn btn-gold" onclick="sendConfirm(\''+id+'\')">✓ Confirm & Email</button>');
  });
}

function sendConfirm(id) {
  var msg = document.getElementById('confMsg').value;
  api('POST', '/api/bookings/'+id+'/confirm', {message:msg}, function(err) {
    toast(err ? 'Error sending' : 'Confirmed & emailed ✓', err?'err':'ok');
    closeModal();
    loadBookings();
  });
}

function msgBooking(id) {
  api('GET', '/api/bookings/'+id, null, function(err, b) {
    if (err) return;
    openModal('Message — '+b.fullName,

function sendMsg(id) {

  api('POST', '/api/bookings/'+id+'/message', {message:msg,newStatus:stat}, function(err) {
    toast(err ? 'Error' : 'Sent ✓', err?'err':'ok');
    closeModal();
    loadBookings();

function filesModal(id) {

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function openModal(title, body, foot) {
  document.getElementById('mTitle').textContent = title;
  document.getElementById('mBody').innerHTML = body || '';
  document.getElementById('mFoot').innerHTML = foot || '';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function toast(msg, type) {
  var c = document.getElementById('toastC');
  var t = document.createElement('div');
  t.className = 'toast' + (type==='ok'?' ok':type==='err'?' err':'');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity 0.4s'; }, 3200);
  setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 3700);
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function timeAgo(iso) {
  var diff = Date.now() - new Date(iso).getTime();
  var m = Math.floor(diff/60000), h = Math.floor(m/60), d = Math.floor(h/24);
  if (d > 0) return d+'d ago';
  if (h > 0) return h+'h ago';
  if (m > 0) return m+'m ago';
  return 'just now';
}
